{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card p-4">

        <h2>My Profile</h2>

        <hr>

        <p><strong>Username:</strong> {{ request.user.username }}</p>

        <p><strong>College:</strong> {{ profile.college }}</p>

        <p><strong>Year:</strong> {{ profile.year }}</p>

        <p><strong>Branch:</strong> {{ profile.branch }}</p>

    </div>

</div>

{% endblock %}
